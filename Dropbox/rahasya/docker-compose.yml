version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rahasya-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rahasya
      POSTGRES_PASSWORD: rahasya_secret
      POSTGRES_DB: rahasya
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
